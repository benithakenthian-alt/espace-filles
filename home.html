<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Accueil</title>
<link rel="stylesheet" href="sstyle.css">

<style>
/* SECTION ACCUEIL */
.home-container {
    max-width: 700px;
    margin: 100px auto;
    text-align: center;
    padding: 30px;
    border-radius: 25px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 0.8s ease;
}

.home-container h2 {
    font-size: 28px;
    margin-bottom: 15px;
}

.home-container p {
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 20px;
}

/* LISTE */
.features {
    text-align: left;
    margin-top: 20px;
}

.features p {
    margin: 8px 0;
    font-weight: bold;
}

/* BOUTON */
.home-btn {
    margin-top: 25px;
    padding: 14px 30px;
    border-radius: 30px;
    border: none;
    background: #8e24aa;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.home-btn:hover {
    background: #6a1b9a;
    transform: scale(1.05);
}
</style>

</head>

<body>

<header>
    <h1>Espace Filles</h1>
</header>

<div class="home-container">

    <h2>Bienvenue</h2>

    <p>
        Un espace sûr et inspirant pour toutes les filles 
        Ici, tu peux t’exprimer, partager et grandir librement.
    </p>

    <div class="features">
        <p>Discuter avec d'autres filles</p>
        <p>Partager ton histoire</p>
        <p>Montrer tes talents</p>
        <p>Connaître tes droits</p>
    </div>

    <button class="home-btn" onclick="goToMenu()">
        Continuer
    </button>

</div>

<script>
function goToMenu() {
    window.location.href = "menu.html";
}

// sécurité
if (!localStorage.getItem("user")) {
    window.location.href = "index.html";
}
</script>

</body>
</html>
